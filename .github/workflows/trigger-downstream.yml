# Trigger downstream repos to pull latest shade-mcp release
name: Trigger Downstream Updates

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to dispatch (e.g. v0.1.0)'
        required: true

jobs:
  trigger-downstream:
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Wait for release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "Waiting for release asset on tag $TAG..."
          for i in $(seq 1 30); do
            ASSET_URL=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
              | jq -r '.assets[]? | select(.name == "shade-mcp-dist.tar.gz") | .browser_download_url // empty' 2>/dev/null)
            if [ -n "$ASSET_URL" ]; then
              echo "Release asset found: $ASSET_URL"
              exit 0
            fi
            echo "Attempt $i/30 - asset not ready, waiting 10s..."
            sleep 10
          done
          echo "Timed out waiting for release asset"
          exit 1

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.NOISEDECK_APP_ID }}
          private-key: ${{ secrets.NOISEDECK_APP_PRIVATE_KEY }}
          owner: noisefactorllc

      - name: Trigger noisemaker
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: noisefactorllc/noisemaker
          event-type: shade-mcp-updated
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}", "tag": "${{ steps.tag.outputs.tag }}"}'

      - name: Trigger portable
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: noisefactorllc/portable
          event-type: shade-mcp-updated
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}", "tag": "${{ steps.tag.outputs.tag }}"}'

      - name: Trigger shade
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: noisefactorllc/shade
          event-type: shade-mcp-updated
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}", "tag": "${{ steps.tag.outputs.tag }}"}'
